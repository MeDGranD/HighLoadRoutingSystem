apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mission-service
  labels:
    app: mission-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: mission-service
  template:
    metadata:
      labels:
        app: mission-service
    spec:
      containers:
        - name: mission-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-mission-config
            - secretRef:
                name: {{ .Release.Name }}-mission-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}