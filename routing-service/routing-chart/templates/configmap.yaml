apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-routing-config
data:
  REDIS_HOST: {{ .Values.config.REDIS_HOST | quote }}
  KAFKA_SERVER: {{ .Values.config.KAFKA_SERVER | quote }}
  KAFKA_PORT: {{ .Values.config.KAFKA_PORT | quote }}
  MINIO_HOST: {{ .Values.config.MINIO_HOST | quote }}
  REGION_ID: {{ .Values.config.REGION_ID | quote }}