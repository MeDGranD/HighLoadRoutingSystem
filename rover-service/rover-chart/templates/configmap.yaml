apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-rover-config
data:
  POSTGRES_HOST: {{ .Values.config.POSTGRES_HOST | quote }}
  KAFKA_SERVER: {{ .Values.config.KAFKA_SERVER | quote }}
  KAFKA_PORT: {{ .Values.config.KAFKA_PORT | quote }}
  REDIS_HOST: {{ .Values.config.REDIS_HOST | quote }}