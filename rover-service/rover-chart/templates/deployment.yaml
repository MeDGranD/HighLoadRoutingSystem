apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-rover-service
  labels:
    app: rover-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rover-service
  template:
    metadata:
      labels:
        app: rover-service
    spec:
      containers:
        - name: rover-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-rover-config
            - secretRef:
                name: {{ .Release.Name }}-rover-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}