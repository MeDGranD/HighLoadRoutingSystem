apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-planner-global
  labels:
    app: planner-global
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: planner-global
  template:
    metadata:
      labels:
        app: planner-global
    spec:
      containers:
        - name: planner-global
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-planner-config
            - secretRef:
                name: {{ .Release.Name }}-planner-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}