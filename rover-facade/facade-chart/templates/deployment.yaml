apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-rover-facade
  labels:
    app: rover-facade
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rover-facade
  template:
    metadata:
      labels:
        app: rover-facade
    spec:
      containers:
        - name: rover-facade
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-facade-config
            - secretRef:
                name: {{ .Release.Name }}-facade-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}