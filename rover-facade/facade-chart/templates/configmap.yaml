apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-facade-config
data:
  REDIS_HOST: {{ .Values.config.REDIS_HOST | quote }}
  KAFKA_SERVER: {{ .Values.config.KAFKA_SERVER | quote }}
  KAFKA_PORT: {{ .Values.config.KAFKA_PORT | quote }}
  CLICKHOUSE_HOST: {{ .Values.config.CLICKHOUSE_HOST | quote }}
  MQTT_HOST: {{ .Values.config.MQTT_HOST | quote }}