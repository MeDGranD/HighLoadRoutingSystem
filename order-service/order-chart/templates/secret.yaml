apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-order-secret
type: Opaque
data:
  POSTGRES_USERNAME: {{ .Values.secrets.POSTGRES_USERNAME | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.REDIS_PASSWORD | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.MINIO_ACCESS_KEY | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.MINIO_SECRET_KEY | b64enc | quote }}